<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Neon Hero</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="hero">
    <h1 class="neon-text">Cyber Neon World</h1>
    <p class="subtext">Futuristic landing page with interactive sparks</p>
    <div class="buttons">
      <button class="epic-neon-btn"><span>Get Started</span></button>
      <button class="epic-neon-btn"><span>Learn More</span></button>
    </div>
  </div>
  <canvas id="sparks-canvas"></canvas>

  <script>
    const canvas = document.getElementById('sparks-canvas');
    const ctx = canvas.getContext('2d');
    let sparks = [];

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    function createSpark(x, y) {
      sparks.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 1.5) * 2,
        alpha: 1,
        size: Math.random() * 4 + 2
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      sparks.forEach((spark, i) => {
        ctx.fillStyle = `rgba(0,255,255,${spark.alpha})`;
        ctx.beginPath();
        ctx.arc(spark.x, spark.y, spark.size, 0, Math.PI*2);
        ctx.fill();
        spark.x += spark.vx;
        spark.y += spark.vy;
        spark.alpha -= 0.02;
        if (spark.alpha <= 0) sparks.splice(i,1);
      });
      requestAnimationFrame(animate);
    }
    animate();

    function spawnSparks(e) {
      let x = e.clientX || e.touches[0].clientX;
      let y = e.clientY || e.touches[0].clientY;
      for(let i=0;i<3;i++) createSpark(x, y);
    }

    window.addEventListener('mousemove', spawnSparks);
    window.addEventListener('touchmove', spawnSparks, {passive:true});
  </script>
</body>
</html>
